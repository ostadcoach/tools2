name: 🧠 هوشمند AzadiBridge – دانلود هر چیزی
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک (YouTube, Instagram, Twitter, Telegram, Aparat, Spotify, و ...)'
        required: true
        type: string
      output_folder:
        description: 'پوشه خروجی'
        default: 'downloads'
        type: string
      quality:
        description: 'کیفیت (best, 1080p, 720p, audio, doc)'
        default: 'best'
        type: string

jobs:
  azadi_download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 🚀 نصب همه ابزارهای لازم
        run: |
          pip install yt-dlp instaloader spotdl telethon praw beautifulsoup4 requests
          sudo apt-get update && sudo apt-get install -y wget git-lfs
          git lfs install
          npm install -g puppeteer --force
      
      - name: 🧠 تشخیص هوشمند نوع لینک
        id: detect
        run: |
          python scripts/smart_detect.py "${{ github.event.inputs.url }}" > platform.txt
          echo "PLATFORM=$(cat platform.txt)" >> $GITHUB_ENV
      
      - name: 📥 دانلود بر اساس پلتفرم تشخیص داده شده
        run: |
          mkdir -p "${{ github.event.inputs.output_folder }}"
          cd "${{ github.event.inputs.output_folder }}"
          
          case "${{ env.PLATFORM }}" in
            youtube)
              yt-dlp -f "best[height<=${{ github.event.inputs.quality }}]" -o "%(title)s.%(ext)s" "${{ github.event.inputs.url }}"
              ;;
            instagram)
              instaloader --no-login --dirname-pattern="." --filename-pattern="%(shortcode)s" "${{ github.event.inputs.url }}"
              ;;
            twitter|x)
              yt-dlp -o "%(title)s.%(ext)s" "${{ github.event.inputs.url }}"
              ;;
            telegram)
              # نیاز به secrets.TG_API_ID و TG_API_HASH
              python ../scripts/telegram_dl.py "${{ github.event.inputs.url }}"
              ;;
            aparat)
              yt-dlp -f best -o "%(title)s.%(ext)s" "${{ github.event.inputs.url }}"
              ;;
            spotify)
              spotdl "${{ github.event.inputs.url }}" --output "./"
              ;;
            webpage)
              python ../scripts/web_archiver.py "${{ github.event.inputs.url }}" "./"
              ;;
            *)
              wget --progress=bar:force "${{ github.event.inputs.url }}" 2>&1
              ;;
          esac
      
      - name: 🔪 تقسیم فایل‌های بزرگ (بیشتر از 95MB)
        run: |
          cd "${{ github.event.inputs.output_folder }}"
          for file in *; do
            if [ -f "$file" ] && [ $(stat -c%s "$file") -gt 95000000 ]; then
              ../scripts/file_splitter.sh "$file"
              rm "$file"
            fi
          done
      
      - name: 📤 کامیت و پوش به مخزن
        run: |
          git config user.name "AzadiBridge Bot"
          git config user.email "bot@azadibridge.io"
          git add "${{ github.event.inputs.output_folder }}"
          git diff --staged --quiet || git commit -m "✨ دانلود خودکار: ${{ github.event.inputs.url }}"
          git push
